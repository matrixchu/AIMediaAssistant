<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Media Assistant</title>
  <style>
    :root { --bg:#0f1220; --panel:#1a1f35; --accent:#6c8cff; --text:#e6e9f5; --muted:#9aa3c0; }
    * { box-sizing: border-box; }
    body { margin:0; font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
           background: var(--bg); color: var(--text); }
    header { padding:18px 24px; background:var(--panel); border-bottom:1px solid #2a3050; }
    header h1 { margin:0; font-size:18px; }
    header p { margin:4px 0 0; color:var(--muted); font-size:13px; }
    .wrap { display:grid; grid-template-columns: 1fr 1fr; gap:16px; padding:16px 24px; }
    .card { background:var(--panel); border:1px solid #2a3050; border-radius:12px; padding:16px; }
    .card h2 { margin:0 0 12px; font-size:14px; color:var(--accent); text-transform:uppercase; letter-spacing:.5px; }
    input, button { font-size:14px; border-radius:8px; border:1px solid #2a3050; }
    input { background:#11152a; color:var(--text); padding:10px; width:100%; }
    button { background:var(--accent); color:#fff; border:none; padding:10px 14px; cursor:pointer; }
    button:hover { opacity:.9; }
    .row { display:flex; gap:8px; margin-bottom:12px; }
    pre { background:#11152a; padding:12px; border-radius:8px; overflow:auto; max-height:320px;
          font-size:12px; color:var(--muted); white-space:pre-wrap; word-break:break-word; }
    .chat-log { max-height:280px; overflow:auto; margin-bottom:12px; }
    .msg { padding:8px 12px; border-radius:8px; margin-bottom:8px; font-size:14px; }
    .msg.user { background:#243056; text-align:right; }
    .msg.bot { background:#11152a; }
    .full { grid-column: 1 / -1; }
    .hint { color:var(--muted); font-size:12px; margin-top:8px; }
  </style>
</head>
<body>
  <header>
    <h1>🎬 AI Media Assistant</h1>
    <p>LangChain · LangGraph · RAG · MCP — search, download, follow shows and get recommendations.</p>
  </header>

  <div class="wrap">
    <div class="card full">
      <h2>Agent Chat</h2>
      <div id="chatLog" class="chat-log"></div>
      <div class="row">
        <input id="chatInput" placeholder='Try: 下载《沙丘2》 · 追《最后生还者》第二季 · 推荐科幻电影' />
        <button onclick="sendChat()">Send</button>
      </div>
      <div class="hint">Examples: "下载《沙丘2》", "追《最后生还者》第二季", "最近有什么值得下载的科幻电影？"</div>
    </div>

    <div class="card">
      <h2>Search</h2>
      <div class="row">
        <input id="searchInput" placeholder="Keyword e.g. Dune Part Two" />
        <button onclick="doSearch()">Search</button>
      </div>
      <pre id="searchOut">—</pre>
    </div>

    <div class="card">
      <h2>Downloads</h2>
      <div class="row"><button onclick="loadDownloads()">Refresh</button></div>
      <pre id="downloadsOut">—</pre>
    </div>

    <div class="card">
      <h2>Subscriptions</h2>
      <div class="row"><button onclick="loadSubs()">Refresh</button></div>
      <pre id="subsOut">—</pre>
    </div>

    <div class="card">
      <h2>Recommendations (RAG)</h2>
      <div class="row">
        <input id="recInput" placeholder="e.g. sci-fi movies" />
        <button onclick="loadRecs()">Recommend</button>
      </div>
      <pre id="recsOut">—</pre>
    </div>
  </div>

  <script>
    async function api(path, opts) {
      const res = await fetch(path, opts);
      return res.json();
    }
    function show(id, data) {
      document.getElementById(id).textContent = JSON.stringify(data, null, 2);
    }
    function addMsg(text, cls) {
      const log = document.getElementById('chatLog');
      const div = document.createElement('div');
      div.className = 'msg ' + cls;
      div.textContent = text;
      log.appendChild(div);
      log.scrollTop = log.scrollHeight;
    }
    async function sendChat() {
      const input = document.getElementById('chatInput');
      const msg = input.value.trim();
      if (!msg) return;
      addMsg(msg, 'user');
      input.value = '';
      const data = await api('/api/agent/chat', {
        method: 'POST', headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ message: msg })
      });
      addMsg(data.reply, 'bot');
      loadDownloads();
    }
    document.getElementById('chatInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') sendChat();
    });
    async function doSearch() {
      const kw = document.getElementById('searchInput').value;
      show('searchOut', await api('/api/search?keyword=' + encodeURIComponent(kw)));
    }
    async function loadDownloads() { show('downloadsOut', await api('/api/downloads')); }
    async function loadSubs() { show('subsOut', await api('/api/subscriptions')); }
    async function loadRecs() {
      const q = document.getElementById('recInput').value;
      show('recsOut', await api('/api/recommendations?query=' + encodeURIComponent(q)));
    }
  </script>
</body>
</html>
